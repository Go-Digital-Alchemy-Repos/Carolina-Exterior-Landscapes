openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: quotes
    description: Quote request operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /residential-quotes:
    post:
      operationId: createResidentialQuote
      tags: [quotes]
      summary: Submit a residential / unified quote request
      description: Submit a quote request from the unified "Get a Quote" form with an audience selector.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResidentialQuoteInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /commercial-quotes:
    post:
      operationId: createCommercialQuote
      tags: [quotes]
      summary: Submit a commercial quote request
      description: Submit a commercial quote request with property-specific fields.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommercialQuoteInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    QuoteResponse:
      type: object
      required:
        - id
        - message
      properties:
        id:
          type: integer
        message:
          type: string
    ApiError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
    ResidentialQuoteInput:
      type: object
      required:
        - name
        - email
        - phone
        - audienceType
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          minLength: 1
          format: email
        phone:
          type: string
          minLength: 1
        audienceType:
          type: string
          enum: [residential, commercial]
        address:
          type: string
        city:
          type: string
        servicesInterested:
          type: array
          items:
            type: string
        message:
          type: string
    CommercialQuoteInput:
      type: object
      required:
        - contactName
        - companyName
        - email
        - phone
        - propertyType
      properties:
        contactName:
          type: string
          minLength: 1
        title:
          type: string
        companyName:
          type: string
          minLength: 1
        email:
          type: string
          minLength: 1
          format: email
        phone:
          type: string
          minLength: 1
        propertyAddress:
          type: string
        propertyType:
          type: string
          enum: [Office, Retail, HOA, Industrial, Multi-family, Other]
        numberOfProperties:
          type: string
        servicesNeeded:
          type: array
          items:
            type: string
        currentProvider:
          type: string
        bestTimeToReach:
          type: string
        notes:
          type: string
